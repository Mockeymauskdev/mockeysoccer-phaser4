<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer RPG Auto-Battler</title>
<style>
  body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  #game-container { box-shadow: 0 0 40px rgba(0,0,0,0.9); border: 2px solid #222; position: relative; }
  #fallback { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.0.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-container"></div>
<div id="fallback">
  <h2>Phaser 4 not loaded</h2>
  <p>Download phaser.min.js from <a href="https://phaser.io/download" style="color:#4488ff">phaser.io</a> and place it next to this file.</p>
</div>
<script>
// ==================== CONFIG ====================
const GRID_W = 32;
const GRID_H = 20;
const CELL = 40;
const W = GRID_W * CELL;
const H = GRID_H * CELL;

const DIRECTIONS = [
  {name:'N', dx:0, dy:-1},
  {name:'NE', dx:1, dy:-1},
  {name:'E', dx:1, dy:0},
  {name:'SE', dx:1, dy:1},
  {name:'S', dx:0, dy:1},
  {name:'SW', dx:-1, dy:1},
  {name:'W', dx:-1, dy:0},
  {name:'NW', dx:-1, dy:-1}
];

const FORMATIONS = {
  '4-4-2': {
    t0: [{r:'GK',x:2,y:10}, {r:'DF',x:5,y:4}, {r:'DF',x:5,y:8}, {r:'DF',x:5,y:12}, {r:'DF',x:5,y:16}, {r:'MF',x:9,y:4}, {r:'MF',x:9,y:8}, {r:'MF',x:9,y:12}, {r:'MF',x:9,y:16}, {r:'FW',x:13,y:7}, {r:'FW',x:13,y:13}],
    t1: [{r:'GK',x:29,y:10}, {r:'DF',x:26,y:4}, {r:'DF',x:26,y:8}, {r:'DF',x:26,y:12}, {r:'DF',x:26,y:16}, {r:'MF',x:22,y:4}, {r:'MF',x:22,y:8}, {r:'MF',x:22,y:12}, {r:'MF',x:22,y:16}, {r:'FW',x:18,y:7}, {r:'FW',x:18,y:13}]
  },
  '4-3-3': {
    t0: [{r:'GK',x:2,y:10}, {r:'DF',x:5,y:4}, {r:'DF',x:5,y:8}, {r:'DF',x:5,y:12}, {r:'DF',x:5,y:16}, {r:'MF',x:9,y:7}, {r:'MF',x:9,y:10}, {r:'MF',x:9,y:13}, {r:'FW',x:13,y:4}, {r:'FW',x:13,y:10}, {r:'FW',x:13,y:16}],
    t1: [{r:'GK',x:29,y:10}, {r:'DF',x:26,y:4}, {r:'DF',x:26,y:8}, {r:'DF',x:26,y:12}, {r:'DF',x:26,y:16}, {r:'MF',x:22,y:7}, {r:'MF',x:22,y:10}, {r:'MF',x:22,y:13}, {r:'FW',x:18,y:4}, {r:'FW',x:18,y:10}, {r:'FW',x:18,y:16}]
  },
  '3-5-2': {
    t0: [{r:'GK',x:2,y:10}, {r:'DF',x:5,y:7}, {r:'DF',x:5,y:10}, {r:'DF',x:5,y:13}, {r:'MF',x:9,y:4}, {r:'MF',x:9,y:7}, {r:'MF',x:9,y:10}, {r:'MF',x:9,y:13}, {r:'MF',x:9,y:16}, {r:'FW',x:13,y:8}, {r:'FW',x:13,y:12}],
    t1: [{r:'GK',x:29,y:10}, {r:'DF',x:26,y:7}, {r:'DF',x:26,y:10}, {r:'DF',x:26,y:13}, {r:'MF',x:22,y:4}, {r:'MF',x:22,y:7}, {r:'MF',x:22,y:10}, {r:'MF',x:22,y:13}, {r:'MF',x:22,y:16}, {r:'FW',x:18,y:8}, {r:'FW',x:18,y:12}]
  },
  '5-4-1': {
    t0: [{r:'GK',x:2,y:10}, {r:'DF',x:5,y:3}, {r:'DF',x:5,y:6}, {r:'DF',x:5,y:10}, {r:'DF',x:5,y:14}, {r:'DF',x:5,y:17}, {r:'MF',x:9,y:5}, {r:'MF',x:9,y:8}, {r:'MF',x:9,y:12}, {r:'MF',x:9,y:15}, {r:'FW',x:13,y:10}],
    t1: [{r:'GK',x:29,y:10}, {r:'DF',x:26,y:3}, {r:'DF',x:26,y:6}, {r:'DF',x:26,y:10}, {r:'DF',x:26,y:14}, {r:'DF',x:26,y:17}, {r:'MF',x:22,y:5}, {r:'MF',x:22,y:8}, {r:'MF',x:22,y:12}, {r:'MF',x:22,y:15}, {r:'FW',x:18,y:10}]
  }
};

const FORM_KEYS = Object.keys(FORMATIONS);
const MENTALITIES = ['Attacking', 'Balanced', 'Defensive'];

function gw(gx, gy) { return { x: gx * CELL + CELL / 2, y: gy * CELL + CELL / 2 }; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function dist(a, b) { return Math.abs(a.gx - b.gx) + Math.abs(a.gy - b.gy); }
function distXY(ax, ay, bx, by) { return Math.abs(ax - bx) + Math.abs(ay - by); }

// ==================== MENU SCENE ====================
class MenuScene extends Phaser.Scene {
  constructor() { super('MenuScene'); }

  create() {
    this.cameras.main.setBackgroundColor('#0a0a0a');

    // Title
    this.add.text(W / 2, 80, 'SOCCER RPG', { fontSize: '48px', color: '#ffd700', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(W / 2, 140, 'AI Auto-Battler Simulation', { fontSize: '18px', color: '#888' }).setOrigin(0.5);

    // AI Coach cards
    this.coach0 = { name: 'Coach Blue', formation: Phaser.Utils.Array.GetRandom(FORM_KEYS), mentality: Phaser.Utils.Array.GetRandom(MENTALITIES) };
    this.coach1 = { name: 'Coach Red', formation: Phaser.Utils.Array.GetRandom(FORM_KEYS), mentality: Phaser.Utils.Array.GetRandom(MENTALITIES) };

    this.drawCoachCard(280, 300, this.coach0, 0x2244aa);
    this.drawCoachCard(1000, 300, this.coach1, 0xaa2222);

    this.add.text(W / 2, 420, 'VS', { fontSize: '64px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);

    // Start button
    const btn = this.add.rectangle(W / 2, 520, 260, 60, 0x00aa44).setInteractive({ useHandCursor: true });
    this.add.text(W / 2, 520, 'START MATCH', { fontSize: '22px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    btn.on('pointerover', () => btn.setFillStyle(0x00cc55));
    btn.on('pointerout', () => btn.setFillStyle(0x00aa44));
    btn.on('pointerdown', () => {
      this.scene.start('MatchScene', { coach0: this.coach0, coach1: this.coach1 });
    });

    // Mini pitch preview
    this.drawPreview();
  }

  drawCoachCard(x, y, coach, color) {
    const bg = this.add.rectangle(x, y, 280, 180, color, 0.2).setStrokeStyle(2, color);
    this.add.text(x, y - 60, coach.name, { fontSize: '20px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(x, y - 20, 'Formation:', { fontSize: '14px', color: '#aaa' }).setOrigin(0.5);
    this.add.text(x, y + 5, coach.formation, { fontSize: '24px', color: '#ffd700', fontStyle: 'bold' }).setOrigin(0.5);
    this.add.text(x, y + 45, 'Mentality: ' + coach.mentality, { fontSize: '14px', color: '#ccc' }).setOrigin(0.5);
  }

  drawPreview() {
    const g = this.add.graphics();
    const mx = W / 2 - 150, my = 620, mw = 300, mh = 120;
    g.fillStyle(0x1a5c1a); g.fillRect(mx, my, mw, mh);
    g.lineStyle(2, 0xffffff, 0.4); g.strokeRect(mx, my, mw, mh);
    g.lineBetween(mx + mw / 2, my, mx + mw / 2, my + mh);

    const draw = (formKey, side, col) => {
      const form = FORMATIONS[formKey];
      const arr = side === 0 ? form.t0 : form.t1;
      arr.forEach(p => {
        g.fillStyle(col, 1);
        g.fillCircle(mx + (p.x / GRID_W) * mw, my + (p.y / GRID_H) * mh, 3);
      });
    };
    draw(this.coach0.formation, 0, 0x4488ff);
    draw(this.coach1.formation, 1, 0xff4444);
  }
}

// ==================== MATCH SCENE ====================
class MatchScene extends Phaser.Scene {
  constructor() { super('MatchScene'); }

  init(data) {
    this.coach0 = data.coach0;
    this.coach1 = data.coach1;
  }

  create() {
    this.matchState = 'KICKOFF';
    this.simSpeed = 1;
    this.score = { t0: 0, t1: 0 };
    this.half = 1;
    this.matchTime = 0;
    this.aiTickTimer = 0;
    this.clashTimer = 0;
    this.cineTimer = 0;
    this.pendingAction = null;

    // Speed controls
    this.speeds = [1, 2, 4];
    this.speedIdx = 0;

    this.keys = this.input.keyboard.addKeys({
      space: 'SPACE', one: 'ONE', two: 'TWO', three: 'THREE', p: 'P'
    });

    this.makeTextures();
    this.drawPitch();
    this.gridG = this.add.graphics();
    this.drawGrid();

    this.spatG = this.add.graphics();
    this.fxG = this.add.graphics();

    this.players = [];
    this.team0 = [];
    this.team1 = [];

    this.spawnPlayers();
    this.ball = new Ball(this);

    // UI
    this.scoreT = this.add.text(W / 2, 18, '0 - 0', { fontSize: '28px', color: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
    this.timeT = this.add.text(W / 2, 48, '00:00', { fontSize: '14px', color: '#ccc' }).setOrigin(0.5);
    this.stateT = this.add.text(12, 12, 'KICKOFF', { fontSize: '13px', color: '#0f0' });
    this.speedT = this.add.text(W - 12, 12, '1x', { fontSize: '13px', color: '#ffd700' }).setOrigin(1, 0);
    this.hintT = this.add.text(W / 2, H - 20, 'SPACE=Pause  1=1x  2=2x  3=4x', { fontSize: '11px', color: '#666' }).setOrigin(0.5);

    this.cineText = null;
    this.cineSub = null;
    this.uiContainer = null;

    this.resetKickoff();

    // Clock
    this.time.addEvent({ delay: 1000, loop: true, callback: () => this.tickClock() });
  }

  makeTextures() {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    g.fillStyle(0x4488ff); g.fillCircle(14, 14, 14); g.lineStyle(2, 0xffffff); g.strokeCircle(14, 14, 14); g.generateTexture('p0', 28, 28);
    g.clear(); g.fillStyle(0xff4444); g.fillCircle(14, 14, 14); g.lineStyle(2, 0xffffff); g.strokeCircle(14, 14, 14); g.generateTexture('p1', 28, 28);
    g.clear(); g.fillStyle(0xffffff); g.fillCircle(8, 8, 8); g.lineStyle(2, 0x000000); g.strokeCircle(8, 8, 8); g.generateTexture('ball', 16, 16);
    g.clear(); g.fillStyle(0x00ff00, 0.25); g.fillRect(0, 0, CELL, CELL); g.generateTexture('hl_c', CELL, CELL);
    g.clear(); g.fillStyle(0xff0000, 0.35); g.fillRect(0, 0, CELL, CELL); g.generateTexture('hl_b', CELL, CELL);
    g.destroy();
  }

  drawPitch() {
    const g = this.add.graphics();
    g.fillStyle(0x2d8a2d); g.fillRect(0, 0, W, H);
    for (let y = 0; y < GRID_H; y += 2) { g.fillStyle(0x267a26); g.fillRect(0, y * CELL, W, CELL); }
    g.lineStyle(3, 0xffffff, 0.9);
    g.strokeRect(CELL, CELL, W - 2 * CELL, H - 2 * CELL);
    g.lineBetween(W / 2, CELL, W / 2, H - CELL);
    g.strokeCircle(W / 2, H / 2, 3 * CELL);
    g.fillStyle(0xffffff, 0.9); g.fillCircle(W / 2, H / 2, 4);
    g.fillStyle(0xffffff, 0.25);
    g.fillRect(0, H / 2 - 2 * CELL, CELL, 4 * CELL);
    g.fillRect(W - CELL, H / 2 - 2 * CELL, CELL, 4 * CELL);
    g.lineStyle(3, 0xffffff, 0.8);
    g.strokeRect(CELL, H / 2 - 2 * CELL, 2 * CELL, 4 * CELL);
    g.strokeRect(W - 3 * CELL, H / 2 - 2 * CELL, 2 * CELL, 4 * CELL);
    g.fillStyle(0xffffff, 0.8); g.fillCircle(3 * CELL, H / 2, 3); g.fillCircle(W - 3 * CELL, H / 2, 3);
  }

  drawGrid() {
    this.gridG.clear();
    this.gridG.lineStyle(1, 0xffffff, 0.05);
    for (let x = 0; x <= GRID_W; x++) this.gridG.lineBetween(x * CELL, 0, x * CELL, H);
    for (let y = 0; y <= GRID_H; y++) this.gridG.lineBetween(0, y * CELL, W, y * CELL);
  }

  spawnPlayers() {
    const sp = (team, list) => {
      list.forEach((d, i) => {
        const p = new Player(this, team, i, d.r, d.x, d.y);
        this.players.push(p);
        (team === 0 ? this.team0 : this.team1).push(p);
      });
    };
    sp(0, FORMATIONS[this.coach0.formation].t0);
    sp(1, FORMATIONS[this.coach1.formation].t1);
  }

  resetKickoff() {
    this.matchState = 'KICKOFF';
    this.stateT.setText('KICKOFF');
    this.players.forEach((p, i) => {
      const f = p.team === 0 ? FORMATIONS[this.coach0.formation].t0 : FORMATIONS[this.coach1.formation].t1;
      p.setGP(f[i].x, f[i].y, 400);
      p.hasBall = false;
    });
    this.ball.setCarrier(null);
    this.ball.moveTo(16, 10, 300);
    this.time.delayedCall(600 / this.simSpeed, () => {
      const starter = Phaser.Math.Between(0, 1) === 0 ? this.team0[9] : this.team1[9];
      this.ball.setCarrier(starter);
      this.matchState = 'PLAY';
      this.stateT.setText('PLAY');
    });
  }

  tickClock() {
    if (this.matchState !== 'PLAY' && this.matchState !== 'KICKOFF') return;
    this.matchTime++;
    const m = Math.floor(this.matchTime / 60).toString().padStart(2, '0');
    const s = (this.matchTime % 60).toString().padStart(2, '0');
    this.timeT.setText(m + ':' + s);
    if (this.matchTime >= 90) this.endMatch();
  }

  update(time, delta) {
    // Speed controls
    if (Phaser.Input.Keyboard.JustDown(this.keys.space)) this.togglePause();
    if (Phaser.Input.Keyboard.JustDown(this.keys.one)) this.setSpeed(0);
    if (Phaser.Input.Keyboard.JustDown(this.keys.two)) this.setSpeed(1);
    if (Phaser.Input.Keyboard.JustDown(this.keys.three)) this.setSpeed(2);

    if (this.matchState === 'PAUSE') return;

    const dt = delta * this.simSpeed;

    if (this.matchState === 'PLAY' || this.matchState === 'KICKOFF') {
      this.ball.update();
      this.aiTickTimer += dt;

      // AI tick every 200ms (scaled by sim speed)
      if (this.aiTickTimer > 200) {
        this.aiTickTimer = 0;
        this.players.forEach(p => p.updateAI(this.ball, this));
        this.updateGKs();
      }

      // Camera follow ball
      this.cameras.main.startFollow(this.ball.sprite, true, 0.08, 0.08);

      this.checkBounds();
      if (this.matchState === 'PLAY' && this.ball.carrier) this.checkClash();
      this.checkGoal();

    } else if (this.matchState === 'CLASH') {
      this.clashTimer -= dt;
      if (this.clashTimer <= 0) this.resolveClashAuto();

    } else if (this.matchState === 'CINEMATIC') {
      this.cineTimer -= dt;
      if (this.cineTimer <= 0) this.applyCinematicResult();

    } else if (this.matchState === 'SETPIECE') {
      this.clashTimer -= dt;
      if (this.clashTimer <= 0) this.resolveSetPieceAuto();
    }
  }

  setSpeed(idx) {
    this.speedIdx = idx;
    this.simSpeed = this.speeds[idx];
    this.speedT.setText(this.simSpeed + 'x');
    this.tweens.timeScale = this.simSpeed;
  }

  togglePause() {
    if (this.matchState === 'PAUSE') {
      this.matchState = this.prevState || 'PLAY';
      this.stateT.setText(this.matchState);
    } else {
      this.prevState = this.matchState;
      this.matchState = 'PAUSE';
      this.stateT.setText('PAUSED');
    }
  }

  // ==================== AI SYSTEMS ====================
  updateGKs() {
    [this.team0[0], this.team1[0]].forEach(gk => {
      if (gk.hasBall) return;
      const goalX = gk.team === 0 ? 2 : 29;
      const d = distXY(gk.gx, gk.gy, this.ball.gx, this.ball.gy);
      if (d <= 3 && !this.ball.carrier && !this.ball.inFlight) {
        gk.setGP(this.ball.gx, this.ball.gy, 200);
        this.ball.setCarrier(gk);
      } else if (d <= 8) {
        const tx = gk.team === 0 ? clamp(goalX + 1, 2, 4) : clamp(goalX - 1, 28, 30);
        const ty = clamp(this.ball.gy, 8, 12);
        if (distXY(gk.gx, gk.gy, tx, ty) > 0) gk.setGP(tx, ty, 400);
      } else if (gk.gx !== goalX || gk.gy !== 10) {
        gk.setGP(goalX, 10, 600);
      }
    });
  }

  checkBounds() {
    if (this.ball.inFlight) return;
    const bx = this.ball.gx, by = this.ball.gy;
    if (bx < 0 || bx >= GRID_W) {
      const lt = this.ball.lastTeam || 0;
      const rec = lt === 0 ? 1 : 0;
      this.triggerSetPiece('THROW', { x: bx < 0 ? 0 : GRID_W - 1, y: clamp(by, 1, GRID_H - 2), team: rec });
    } else if (by < 0 || by >= GRID_H) {
      if (!(bx >= 12 && bx <= 19)) {
        const lt = this.ball.lastTeam || 0;
        const rec = lt === 0 ? 1 : 0;
        const gkx = rec === 0 ? 2 : 29;
        this.triggerSetPiece('GOALKICK', { x: gkx, y: 10, team: rec });
      }
    }
  }

  triggerSetPiece(type, data) {
    this.matchState = 'SETPIECE';
    this.spData = data;
    this.spType = type;
    this.clashTimer = 2000;
    this.ball.setCarrier(null);
    this.ball.moveTo(data.x, data.y, 100);
    this.stateT.setText('SET PIECE');
    this.showCineText(type.replace('_', ' '), '#ffd700', 800);
  }

  resolveSetPieceAuto() {
    const team = this.spData.team === 0 ? this.team0 : this.team1;
    const tgt = team.find(p => p.role !== 'GK' && distXY(p.gx, p.gy, this.spData.x, this.spData.y) < 8) || team[1];
    this.ball.moveTo(tgt.gx, tgt.gy, 500);
    this.time.delayedCall(500 / this.simSpeed, () => {
      this.ball.setCarrier(tgt);
      this.matchState = 'PLAY';
      this.stateT.setText('PLAY');
    });
  }

  checkClash() {
    const c = this.ball.carrier;
    if (!c) return;
    const foes = c.team === 0 ? this.team1 : this.team0;
    for (let f of foes) {
      if (dist(c, f) <= 1 && !f.prone) {
        this.triggerClash(c, f);
        return;
      }
    }
  }

  triggerClash(off, def) {
    this.matchState = 'CLASH';
    this.cOff = off;
    this.cDef = def;
    this.clashTimer = 2500;

    // Camera zoom to clash
    const cx = (off.sprite.x + def.sprite.x) / 2;
    const cy = (off.sprite.y + def.sprite.y) / 2;
    this.cameras.main.pan(cx, cy, 400, 'Sine.easeInOut');
    this.cameras.main.zoomTo(2.2, 400, 'Sine.easeInOut');
    this.cameras.main.stopFollow();

    // AI picks actions automatically
    const offActs = [
      { name: 'Pass', weight: off.stats.pass },
      { name: 'Through Ball', weight: off.stats.pass * 0.8 },
      { name: 'Dribble', weight: off.stats.speed },
      { name: 'Shoot', weight: off.stats.shoot }
    ];
    // Weighted random pick for offense
    const offPick = this.weightedPick(offActs);
    this.offAction = offPick;

    const defActs = [
      { name: 'Tackle', weight: def.stats.tackle },
      { name: 'Body Block', weight: def.stats.block },
      { name: 'Slide', weight: def.stats.tackle * 0.7 }
    ];
    const defPick = this.weightedPick(defActs);
    this.defAction = defPick;

    // If pass/through ball, pick direction
    if (offPick.name === 'Pass' || offPick.name === 'Through Ball') {
      this.offDir = this.aiPickDirection(off);
    } else {
      this.offDir = null;
    }

    // Show UI briefly
    this.showClashUI(offPick, defPick);
  }

  weightedPick(items) {
    const total = items.reduce((s, i) => s + i.weight, 0);
    let r = Phaser.Math.Between(0, total);
    for (let item of items) {
      r -= item.weight;
      if (r <= 0) return item;
    }
    return items[0];
  }

  aiPickDirection(off) {
    // Score each direction based on spatial analysis
    const foes = off.team === 0 ? this.team1 : this.team0;
    const friends = off.team === 0 ? this.team0 : this.team1;
    let bestDir = DIRECTIONS[2]; // default forward
    let bestScore = -999;

    for (let d of DIRECTIONS) {
      let score = 0;
      let cx = off.gx + d.dx, cy = off.gy + d.dy;
      const max = 8;
      for (let i = 0; i < max; i++) {
        if (cx < 0 || cx >= GRID_W || cy < 0 || cy >= GRID_H) break;
        const occ = this.findAllAt(cx, cy);
        const foe = occ.find(p => p.team !== off.team);
        const friend = occ.find(p => p.team === off.team && p !== off);
        if (foe) { score -= 15; break; }
        if (friend) { score += 20; break; }
        score += 2;
        cx += d.dx; cy += d.dy;
      }
      const fwd = off.team === 0 ? 1 : -1;
      if (d.dx === fwd) score += 10;
      if (d.dx === -fwd) score += 5;
      if (d.dy === 0 && d.dx === fwd) score += 5;

      if (score > bestScore) {
        bestScore = score;
        bestDir = d;
      }
    }
    return bestDir;
  }

  showClashUI(offPick, defPick) {
    if (this.uiContainer) this.uiContainer.destroy();
    this.uiContainer = this.add.container(W / 2, H / 2 + 140);

    const bg = this.add.rectangle(0, 0, 500, 100, 0x000000, 0.85).setStrokeStyle(2, 0x444444);
    this.uiContainer.add(bg);

    const offTxt = this.cOff.role + ': ' + offPick.name + (this.offDir ? ' ' + this.offDir.name : '');
    const defTxt = this.cDef.role + ': ' + defPick.name;

    this.uiContainer.add(this.add.text(-180, -15, offTxt, { fontSize: '14px', color: '#4488ff' }).setOrigin(0, 0.5));
    this.uiContainer.add(this.add.text(20, -15, 'VS', { fontSize: '14px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5));
    this.uiContainer.add(this.add.text(180, -15, defTxt, { fontSize: '14px', color: '#ff4444' }).setOrigin(1, 0.5));
  }

  resolveClashAuto() {
    if (this.uiContainer) { this.uiContainer.destroy(); this.uiContainer = null; }

    const off = this.cOff, def = this.cDef;
    const offStat = this.offAction.name === 'Pass' || this.offAction.name === 'Through Ball' ? off.stats.pass :
                    this.offAction.name === 'Shoot' ? off.stats.shoot : off.stats.speed;
    const defStat = this.defAction.name === 'Tackle' ? def.stats.tackle : def.stats.block;

    const offRate = clamp(60 + (offStat - defStat) * 0.5 + Phaser.Math.Between(-5, 5), 10, 95);
    const defRate = clamp(60 + (defStat - offStat) * 0.5 + Phaser.Math.Between(-5, 5), 10, 95);

    const offRoll = Phaser.Math.Between(1, 100);
    const defRoll = Phaser.Math.Between(1, 100);
    const offWin = offRoll <= offRate;
    const defWin = defRoll <= defRate;

    let winner, actionLabel;
    if (offWin && !defWin) { winner = 'OFFENSE'; actionLabel = this.offAction.name; }
    else if (defWin && !offWin) { winner = 'DEFENSE'; actionLabel = this.defAction.name; }
    else { winner = offRoll >= defRoll ? 'OFFENSE' : 'DEFENSE'; actionLabel = winner === 'OFFENSE' ? this.offAction.name : this.defAction.name; }

    this.pendingResult = { winner, off, def, action: this.offAction, dir: this.offDir };
    this.matchState = 'CINEMATIC';
    this.cineTimer = 1500;

    const col = winner === 'OFFENSE' ? '#4488ff' : '#ff4444';
    this.showCineText(winner + ' WINS!', col, 1200);
    this.shake(300, 8);
  }

  showCineText(text, color, duration) {
    if (this.cineText) this.cineText.destroy();
    if (this.cineSub) this.cineSub.destroy();

    this.cineText = this.add.text(W / 2, H / 2 - 30, text, {
      fontSize: '40px', color: color, fontStyle: 'bold', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5).setScale(0.3).setAlpha(0);

    this.tweens.add({ targets: this.cineText, scale: 1, alpha: 1, duration: 300, ease: 'Back.out' });

    if (duration) {
      this.time.delayedCall(duration, () => {
        if (this.cineText) { this.tweens.add({ targets: this.cineText, alpha: 0, scale: 1.5, duration: 300, onComplete: () => { if (this.cineText) this.cineText.destroy(); } }); }
      });
    }
  }

  applyCinematicResult() {
    if (this.cineText) this.cineText.destroy();
    const res = this.pendingResult;
    const off = res.off, def = res.def;

    // Reset camera
    this.cameras.main.zoomTo(1, 600, 'Sine.easeInOut');

    if (res.winner === 'OFFENSE') {
      if (res.action.name === 'Pass' || res.action.name === 'Through Ball') {
        const d = res.dir || DIRECTIONS[2];
        let tx = off.gx + d.dx * 4, ty = off.gy + d.dy * 4;
        tx = clamp(tx, 0, GRID_W - 1); ty = clamp(ty, 0, GRID_H - 1);
        const t = this.findAt(tx, ty, off.team);
        if (t) {
          this.ball.moveTo(t.gx, t.gy, 400);
          this.time.delayedCall(400 / this.simSpeed, () => this.ball.setCarrier(t));
        } else {
          this.ball.moveTo(tx, ty, 400);
          this.time.delayedCall(400 / this.simSpeed, () => this.ball.setCarrier(null));
        }
      } else if (res.action.name === 'Shoot') {
        const gx = off.team === 0 ? 30 : 1;
        this.ball.moveTo(gx, 10, 600);
        this.time.delayedCall(600 / this.simSpeed, () => {
          if (Math.abs(this.ball.gy - 10) <= 2) this.regGoal(off.team);
          else { this.ball.setCarrier(null); }
        });
      } else {
        // Dribble: push defender back
        def.setGP(clamp(def.gx + (off.team === 0 ? 1 : -1), 0, GRID_W - 1), def.gy, 300);
      }
    } else {
      // Defense wins
      this.ball.setCarrier(null);
      const lx = clamp(off.gx + Phaser.Math.Between(-1, 1), 0, GRID_W - 1);
      const ly = clamp(off.gy + Phaser.Math.Between(-1, 1), 0, GRID_H - 1);
      this.ball.moveTo(lx, ly, 300);
    }

    this.pendingResult = null;
    this.matchState = 'PLAY';
    this.stateT.setText('PLAY');
  }

  checkGoal() {
    if (!this.ball.inFlight) return;
    const bx = this.ball.sprite.x;
    if (bx < CELL && this.ball.gy >= 8 && this.ball.gy <= 12) this.regGoal(1);
    if (bx > W - CELL && this.ball.gy >= 8 && this.ball.gy <= 12) this.regGoal(0);
  }

  regGoal(team) {
    if (this.matchState === 'GOAL') return;
    this.matchState = 'GOAL';
    this.score[team === 0 ? 't0' : 't1']++;
    this.scoreT.setText(this.score.t0 + ' - ' + this.score.t1);
    this.showCineText(team === 0 ? 'BLUE GOAL!' : 'RED GOAL!', '#ffd700', 2000);
    this.time.delayedCall(2000 / this.simSpeed, () => this.resetKickoff());
  }

  endMatch() {
    this.matchState = 'FULLTIME';
    this.cameras.main.stopFollow();
    this.showCineText('FULL TIME', '#fff', 3000);
    this.time.delayedCall(3000, () => this.scene.start('MenuScene'));
  }

  findAt(gx, gy, team) {
    const a = team === 0 ? this.team0 : this.team1;
    return a.find(p => p.gx === gx && p.gy === gy);
  }

  findAllAt(gx, gy) {
    return this.players.filter(p => p.gx === gx && p.gy === gy);
  }

  shake(dur, int) {
    const cam = this.cameras.main, bx = cam.scrollX, by = cam.scrollY;
    let el = 0;
    const ev = this.time.addEvent({
      delay: 16, loop: true, callback: () => {
        el += 16;
        cam.setScroll(bx + (Math.random() - 0.5) * int, by + (Math.random() - 0.5) * int);
        if (el >= dur) { ev.remove(); cam.setScroll(bx, by); }
      }
    });
  }
}

// ==================== PLAYER ====================
class Player {
  constructor(sc, team, idx, role, gx, gy) {
    this.sc = sc; this.team = team; this.idx = idx; this.role = role;
    this.gx = gx; this.gy = gy; this.ax = gx; this.ay = gy;
    this.stats = {
      pass: Phaser.Math.Between(55, 92), tackle: Phaser.Math.Between(55, 92),
      shoot: Phaser.Math.Between(50, 88), speed: Phaser.Math.Between(50, 85),
      block: Phaser.Math.Between(55, 90), positioning: Phaser.Math.Between(50, 90)
    };
    this.fatigue = 100; this.hasBall = false; this.prone = false; this.moving = false;
    const k = team === 0 ? 'p0' : 'p1', w = gw(gx, gy);
    this.sprite = sc.add.sprite(w.x, w.y, k).setOrigin(0.5);
    this.label = sc.add.text(this.sprite.x, this.sprite.y - 18, this.role, {
      fontSize: '10px', color: '#fff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);
  }

  setGP(gx, gy, dur) {
    this.gx = gx; this.gy = gy; this.moving = true;
    const w = gw(gx, gy);
    this.sc.tweens.add({
      targets: [this.sprite, this.label], x: w.x, y: w.y, duration: dur, ease: 'Sine.easeInOut',
      onComplete: () => this.moving = false
    });
  }

  updateAI(ball, sc) {
    if (this.prone || this.hasBall || this.moving || this.role === 'GK') return;

    // Formation shift based on ball
    const sh = Math.floor((ball.gx - 16) * 0.25);
    let tx = clamp(this.ax + sh, 2, GRID_W - 3), ty = this.ay;
    const d = distXY(this.gx, this.gy, ball.gx, ball.gy);
    const bt = ball.carrier ? ball.carrier.team : -1;

    // Mentality modifier
    const coach = this.team === 0 ? sc.coach0 : sc.coach1;
    if (coach.mentality === 'Attacking') { tx += this.team === 0 ? 1 : -1; }
    if (coach.mentality === 'Defensive') { tx += this.team === 0 ? -1 : 1; }

    if (bt === this.team) {
      if (d > 2 && d < 7) { tx = ball.gx + (this.team === 0 ? 2 : -2); ty = clamp(ball.gy + Phaser.Math.Between(-2, 2), 2, GRID_H - 3); }
    } else if (bt !== -1) {
      if (d < 5) { tx = ball.gx; ty = ball.gy; }
      else if (this.role === 'DF') { tx = clamp(tx, this.team === 0 ? 3 : 24, this.team === 0 ? 10 : 28); }
    } else if (d < 6) { tx = ball.gx; ty = ball.gy; }

    if (Math.abs(this.gx - tx) > 1 || Math.abs(this.gy - ty) > 1) {
      const sx = clamp(tx, this.gx - 1, this.gx + 1), sy = clamp(ty, this.gy - 1, this.gy + 1);
      const occ = sc.findAt(sx, sy, this.team);
      if (!occ || occ === this) this.setGP(sx, sy, 350);
    }
  }
}

// ==================== BALL ====================
class Ball {
  constructor(sc) {
    this.sc = sc; this.gx = 16; this.gy = 10;
    this.carrier = null; this.inFlight = false; this.lastTeam = 0;
    const w = gw(16, 10);
    this.sprite = sc.add.sprite(w.x, w.y, 'ball').setOrigin(0.5);
  }
  setCarrier(p) {
    if (this.carrier) this.carrier.hasBall = false;
    this.carrier = p;
    if (p) { p.hasBall = true; this.gx = p.gx; this.gy = p.gy; this.sprite.setPosition(p.sprite.x, p.sprite.y); this.lastTeam = p.team; }
    this.inFlight = false;
  }
  moveTo(gx, gy, dur) {
    if (this.carrier) { this.carrier.hasBall = false; this.carrier = null; }
    this.inFlight = true; this.gx = gx; this.gy = gy;
    const w = gw(gx, gy);
    this.sc.tweens.add({ targets: this.sprite, x: w.x, y: w.y, duration: dur, onComplete: () => this.inFlight = false });
  }
  update() {
    if (this.carrier && !this.carrier.moving) {
      this.sprite.setPosition(this.carrier.sprite.x, this.carrier.sprite.y);
      this.gx = this.carrier.gx; this.gy = this.carrier.gy;
    }
  }
}

  type: Phaser.AUTO,

  parent: 'game-container',

if (typeof Phaser !== 'undefined') {
  new Phaser.Game(config);
} else {

}
